backend = "glx";
vsync = true;
detect-rounded-corners = true;

# Keep regular fade for opacity/open-close transitions.
fading = true;
animations = true;

# Window open/close animations only.
# Do not add geometry/layout animations here, otherwise all tiled windows
# will move when NVWM rearranges the layout after a window appears/disappears.
animation-stiffness-in-tag = 120;
animation-stiffness-tag-change = 90.0;
animation-window-mass = 0.35;
animation-dampening = 20;
animation-clamping = true;
animation-for-open-window = "zoom";
animation-for-unmap-window = "none";
animation-for-transient-window = "none";

# Workspace change fade only.
animation-for-prev-tag = "none";
enable-fading-prev-tag = true;
animation-for-next-tag = "none";
enable-fading-next-tag = true;

# Leave geometry/layout animations undefined.
# If you ever add custom `animations = ({ ... })` rules, avoid triggers like:
# "geometry", "size", "position", "increase-size", "decrease-size".

active-opacity = 1.0;
inactive-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

shadow = true;
shadow-radius = 8;
shadow-opacity = 0.18;
shadow-offset-x = -6;
shadow-offset-y = -6;

blur-method = "gaussian";
blur-size = 8;
blur-deviation = 4.0;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = false;

corner-radius = 10;
round-borders = 1;

shadow-exclude = [
  "class_g = 'Rofi'",
  "class_g = 'dmenu'",
  "name = 'Notification'",
  "_GTK_FRAME_EXTENTS@:c"
];

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];
