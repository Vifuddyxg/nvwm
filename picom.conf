backend = "glx";
vsync = true;
unredir-if-possible = false;
detect-rounded-corners = true;
detect-client-opacity = true;
use-ewmh-active-win = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;

animations = true;
animation-stiffness-in-tag = 120;
animation-stiffness-tag-change = 90.0;
animation-window-mass = 0.35;
animation-dampening = 18;
animation-clamping = true;
animation-for-open-window = "zoom";
animation-for-unmap-window = "squeeze";
animation-for-transient-window = "slide-up";
animation-for-prev-tag = "slide-out-center";
enable-fading-prev-tag = false;
animation-for-next-tag = "slide-in-center";
enable-fading-next-tag = false;

corner-radius = 10;
round-borders = 1;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "name = 'nvwm-bar'",
  "name = 'viwm-bar'"
];

shadow = true;
shadow-radius = 18;
shadow-opacity = 0.22;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-exclude = [
  "class_g = 'Rofi'",
  "class_g = 'dmenu'",
  "name = 'Notification'",
  "_GTK_FRAME_EXTENTS@:c"
];

fading = false;

inactive-opacity = 0.96;
active-opacity = 1.0;
frame-opacity = 0.95;
inactive-opacity-override = false;

blur-method = "dual_kawase";
blur-strength = 5;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = false;
blur-background-exclude = [
  "class_g = 'mpv'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.95; focus = true; };
  dock = { shadow = false; clip-shadow-above = true; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.98; };
  dropdown_menu = { opacity = 0.98; };
};
